<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        /* 设置容器的样式 */
        .container {
            text-align: center; /* 让内部的文字和行内元素（如图片）居中 */
            margin-top: 50px;   /* 距离顶部留点空白 */
        }

        /* 稍微美化一下图片 */
        img {
            max-width: 100%;    /* 确保图片不会超出屏幕宽度 */
            height: auto;
            margin-top: 20px;   /* 图片和标题之间留点间距 */
        }
    </style>
</head>
<body>

    <div class="container">
<h1 style="text-align: center;">
    欢迎来到 <br> AVE MUJICA！
</h1>
        <img src="海玲.gif" alt="我的图片">
    </div>

</body>
</html>
